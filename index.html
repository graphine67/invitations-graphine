<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Invitation – Démo Graphine</title>

<style>
:root{
  --petrol:#113E53;
  --coral:#E85C6D;
  --paper:#F4F0EA;
  --dark:#0f1418;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: "Georgia", serif;
  background:var(--dark);
  color:white;
}

/* écran d'accueil */

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:
  linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.65)),
  url("https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1600&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
}

.hero-content{
  max-width:600px;
}

.hero h1{
  font-size:52px;
  margin:0;
}

.hero p{
  font-size:20px;
  margin:20px 0;
}

button{
  background:var(--coral);
  border:none;
  padding:16px 34px;
  font-size:18px;
  color:white;
  border-radius:40px;
  cursor:pointer;
}

/* invitation */

.invitation{
  display:none;
  min-height:100vh;
  background:var(--paper);
  color:#333;
  padding:80px 20px;
  text-align:center;
}

.card{
  max-width:600px;
  margin:auto;
  padding:40px;
  border:1px solid #ddd;
  background:white;
}

.card h2{
  font-size:40px;
  margin-top:0;
}

.section{
  margin:30px 0;
}

.map{
  display:inline-block;
  margin-top:20px;
  color:var(--petrol);
  text-decoration:none;
  font-weight:bold;
}

.graphine{
  margin-top:40px;
  font-size:14px;
  color:#777;
}
</style>
</head>

<body>

<div class="hero" id="cover">
  <div class="hero-content">
    <h1>Lucie & Thomas</h1>
    <p>vous invitent à célébrer leur mariage</p>
    <button onclick="openInvite()">Ouvrir l'invitation</button>
  </div>
</div>

<div class="invitation" id="invite">

  <div class="card">

    <h2>12 juin 2026</h2>

    <div class="section">
      <strong>Cérémonie</strong><br>
      15h00<br>
      Domaine des Vignes<br>
      Alsace
    </div>

    <a class="map" href="https://maps.google.com" target="_blank">
      Voir le lieu sur la carte
    </a>

    <div class="section">
      Merci de confirmer votre présence
    </div>

    <div class="graphine">
      Démo invitation numérique — Graphine<br>
      à partir de 250 €
    </div>

  </div>

</div>

<script>

function openInvite(){
document.getElementById("cover").style.display="none";
document.getElementById("invite").style.display="block";
window.scrollTo(0,0);
}

</script>

</body>
</html>
